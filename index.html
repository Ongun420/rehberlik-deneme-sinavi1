<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOO | Digital Guide & Culture</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --lila: #E9D5FF;
            --gold: #EAB308;
            --korea-red: #CD313A;
            --korea-blue: #0047A0;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Ubuntu', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- ÜST MENÜ --- */
        header {
            position: fixed; top: 0; width: 100%;
            padding: 10px 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            box-sizing: border-box;
        }

        .header-logo {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none; color: white;
            scale: 0.6; transform-origin: left;
        }

        .nav-links { display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: white; font-size: 0.9rem; opacity: 0.6; transition: 0.3s; letter-spacing: 1px; }
        .nav-links a:hover { opacity: 1; color: var(--lila); }

        /* --- LOGO TASARIMI (MÜHÜR) --- */
        .logo-seal-frame {
            position: relative; padding: 25px 45px;
            display: flex; align-items: center; gap: 15px;
            border-radius: 60px; background: rgba(255, 255, 255, 0.01);
            transition: 0.5s;
        }

        /* Çapraz Renkli Çerçeve */
        .logo-seal-frame::before {
            content: ""; position: absolute; inset: 0; border-radius: 60px; padding: 2px;
            background: linear-gradient(135deg, var(--gold) 0%, transparent 50%, var(--lila) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
        }

        .letter-f { font-size: 6.5rem; font-weight: 700; color: var(--gold); line-height: 1; }
        
        .symbol-o { 
            width: 85px; height: 85px; border-radius: 50%; 
            border: 1px solid rgba(255,255,255,0.15); 
            display: flex; align-items: center; justify-content: center; position: relative; 
        }

        /* Birebir Taegeuk Sarmalı */
        .inner-korea {
            width: 70px; height: 70px; border-radius: 50%;
            background: linear-gradient(180deg, var(--korea-red) 50%, var(--korea-blue) 50%);
            transform: rotate(-30deg); position: relative;
        }
        .inner-korea::before { content: ''; position: absolute; width: 35px; height: 35px; background: var(--korea-red); border-radius: 50%; top: 17.5px; left: 0; }
        .inner-korea::after { content: ''; position: absolute; width: 35px; height: 35px; background: var(--korea-blue); border-radius: 50%; top: 17.5px; right: 0; }

        /* Birebir Pusula İğnesi */
        .compass-needle {
            width: 3px; height: 60px;
            background: linear-gradient(to bottom, var(--gold) 50%, white 50%);
            position: absolute; animation: drift 5s infinite ease-in-out;
        }

        .sub-logo-text { font-size: 0.8rem; letter-spacing: 15px; text-transform: uppercase; margin-top: 20px; font-weight: 700; background: linear-gradient(to right, var(--gold), var(--lila)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- ARKA PLAN VE PANELLER --- */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1; opacity: 0; transition: opacity 1.5s ease; background-size: cover; background-position: center; }
        #bg-home { opacity: 1; background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); }
        #bg-kore { background: linear-gradient(rgba(2,6,23,0.85), rgba(2,6,23,0.85)), url('https://images.unsplash.com/photo-1538669715515-5c39893d7904?q=80&w=1920'); }
        #bg-exam { background: linear-gradient(rgba(2,6,23,0.85), rgba(2,6,23,0.85)), url('https://images.unsplash.com/photo-1599110906885-b024c90c2773?q=80&w=1920'); }

        section { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 0 10%; }
        .glass-panel { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 40px; padding: 60px; max-width: 750px; transform: translateY(40px); opacity: 0; transition: 0.8s ease-out; }
        .active-panel { transform: translateY(0); opacity: 1; }

        .nav-dots { position: fixed; right: 30px; top: 50%; transform: translateY(-50%); z-index: 100; }
