<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOO | Digital Guide & Culture</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-dark: #020617;
        --lila: #E9D5FF;
        --gold: #EAB308;
        --korea-red: #CD313A;
        --korea-blue: #0047A0;
    }

    body, html {
        margin: 0; padding: 0;
        font-family: 'Ubuntu', sans-serif;
        background-color: var(--bg-dark);
        color: white;
        scroll-behavior: smooth;
        overflow-x: hidden;
    }

    /* --- ÜST MENÜ --- */
    header {
        position: fixed; top: 0; width: 100%;
        height: 50px;
        padding: 0 30px;
        display: flex; justify-content: space-between; align-items: center;
        z-index: 1000;
        background: rgba(2, 6, 23, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        box-sizing: border-box;
    }

    .header-brand img { height: 30px; width: auto; display: block; }
    .nav-links a { 
        text-decoration: none; color: white; margin-left: 20px; 
        font-size: 0.75rem; opacity: 0.6; transition: 0.3s; letter-spacing: 1px; 
    }
    .nav-links a:hover { opacity: 1; color: var(--lila); }

    /* --- ANA SAYFA LOGO SİSTEMİ --- */
    .seal-master {
        position: relative; display: inline-flex; align-items: center; justify-content: center;
        gap: 15px; padding: 25px 45px; border-radius: 60px;
        background: rgba(255, 255, 255, 0.01);
    }
    .seal-master::before {
        content: ""; position: absolute; inset: 0; border-radius: 60px; padding: 2.5px;
        background: linear-gradient(135deg, var(--gold) 0%, transparent 50%, var(--lila) 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor; mask-composite: exclude;
    }
    .f-part { font-size: 6rem; font-weight: 700; color: var(--gold); line-height: 1; }
    .o-part { 
        width: 80px; height: 80px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.15);
        display: flex; align-items: center; justify-content: center; position: relative;
    }
    .swirl-korea {
        width: 65px; height: 65px; border-radius: 50%;
        background: linear-gradient(180deg, var(--korea-red) 50%, var(--korea-blue) 50%);
        transform: rotate(-30deg); position: relative;
    }
    .swirl-korea::before { content: ''; position: absolute; width: 32.5px; height: 32.5px; background: var(--korea-red); border-radius: 50%; top: 16.25px; left: 0; }
    .swirl-korea::after { content: ''; position: absolute; width: 32.5px; height: 32.5px; background: var(--korea-blue); border-radius: 50%; top: 16.25px; right: 0; }
    .needle-gold { width: 3px; height: 55px; background: linear-gradient(var(--gold) 50%, #fff 50%); position: absolute; animation: drift 5s infinite ease-in-out; }

    @keyframes drift { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(25deg); } }

    /* --- SECTION VE KARTLAR --- */
    section { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }
    
    .glass-card { 
        background: rgba(255, 255, 255, 0.03); 
        backdrop-filter: blur(25px); 
        border: 1px solid rgba(255, 255, 255, 0.1); 
        border-radius: 40px; 
        padding: 60px; 
        text-align: center;
        transition: transform 0.4s ease, box-shadow 0.4s ease;
        position: relative;
    }

    .glass-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 20px 40px rgba(233, 213, 255, 0.15);
    }

    .text-brand { letter-spacing: 12px; text-transform: uppercase; font-weight: 700; background: linear-gradient(to right, var(--gold), var(--lila)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 20px; }

    /* --- SCROLL ANİMASYONU (SAYFA GENELİ) --- */
    .scroll-indicator {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        opacity: 0.5;
        transition: 0.3s;
        cursor: pointer;
        z-index: 20;
    }
    .scroll-indicator:hover { opacity: 1; }
    .mouse { width: 22px; height: 36px; border: 2px solid var(--lila); border-radius: 20px; position: relative; }
    .wheel { width: 3px; height: 6px; background: var(--gold); border-radius: 2px; position: absolute; top: 6px; left: 50%; transform: translateX(-50%); animation: scroll-wheel 1.6s infinite; }
    @keyframes scroll-wheel { 0% { top: 6px; opacity: 1; } 100% { top: 20px; opacity: 0; } }
    .scroll-text { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: var(--lila); }

    /* Arka Plan */
    .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1; opacity: 0; transition: opacity 1s; background-size: cover; background-position: center; }
    #bg-0 { opacity: 1; background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); }

    /* --- MOBİL AYARLAR --- */
    @media (max-width: 768px) {
        header { padding: 0 15px; }
        .nav-links { display: flex; gap: 8px; }
        .nav-links a { margin-left: 0; font-size: 0.55rem; white-space: nowrap; letter-spacing: 0.5px; }
        .header-brand img { height: 25px; }
        .seal-master { transform: scale(0.7); } /* Logoyu mobilde küçülttük */
        .glass-card { padding: 30px; width: 85%; }
    }
</style>
</head>
<body>

<header>
    <a href="javascript:go(0)" class="header-brand">
        <img src="logo.png" alt="FOO">
    </a>
    <div class="nav-links">
        <a href="javascript:go(0)">GİRİŞ</a>
        <a href="javascript:go(1)">KORE ARŞİVİ</a>
        <a href="javascript:go(2)">SINAV MERKEZİ</a>
    </div>
</header>

<section id="sec-0">
    <div class="glass-card">
        <div class="seal-master">
            <div class="f-part">F</div>
            <div class="o-part"><div class="swirl-korea"></div></div>
            <div class="o-part"><div class="needle-gold"></div></div>
        </div>
        <div class="text-brand">Ongun Orak</div>
        <p style="margin-top: 30px; opacity: 0.7; letter-spacing: 2px; font-weight: 300;">DIGITAL CULTURE PORTAL</p>
    </div>

    <div class="scroll-indicator" onclick="go(1)">
        <span class="scroll-text">Keşfet</span>
        <div class="mouse"><div class="wheel"></div></div>
    </div>
</section>

<section id="sec-1">
    <div class="glass-card">
        <h2 style="color: var(--lila); font-size: 2.5rem; margin: 0;">Kore Arşivi</h2>
        <p style="margin-top: 20px; opacity: 0.8;">Kültür ve dil notları burada hayat bulacak.</p>
    </div>
</section>

<section id="sec-2">
    <div class="glass-card">
        <h2 style="color: var(--gold); font-size: 2.5rem; margin: 0;">Sınav Merkezi</h2>
        <p style="margin-top: 20px; opacity: 0.8;">Rehberlik hazırlık süreci için dijital kütüphane.</p>
    </div>
</section>

<script>
    function go(index) { window.scrollTo({ top: window.innerHeight * index, behavior: 'smooth' }); }
</script>

</body>
</html>
