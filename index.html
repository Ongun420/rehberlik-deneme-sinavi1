<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOO | Digital Guide & Culture</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --lila: #E9D5FF;
            --gold: #EAB308;
            --korea-red: #CD313A;
            --korea-blue: #0047A0;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Ubuntu', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            scroll-behavior: smooth;
        }

        /* --- ÜST MENÜ --- */
        header {
            position: fixed; top: 0; width: 100%;
            padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            box-sizing: border-box;
        }

        .header-logo {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none; color: white;
            font-weight: 700; letter-spacing: 2px;
        }

        .nav-links { display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: white; font-size: 0.85rem; opacity: 0.6; transition: 0.3s; }
        .nav-links a:hover { opacity: 1; color: var(--lila); }

        /* --- ARKA PLAN KATMANLARI --- */
        .bg-layer {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100vh;
            z-index: -1; opacity: 0;
            transition: opacity 1s ease;
            background-size: cover; background-position: center;
        }
        #bg-0 { opacity: 1; background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); }
        #bg-1 { background: linear-gradient(rgba(2,6,23,0.8), rgba(2,6,23,0.8)), url('https://images.unsplash.com/photo-1538669715515-5c39893d7904?q=80&w=1920'); }
        #bg-2 { background: linear-gradient(rgba(2,6,23,0.8), rgba(2,6,23,0.8)), url('https://images.unsplash.com/photo-1599110906885-b024c90c2773?q=80&w=1920'); }

        /* --- SECTIONS --- */
        section {
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 0 10%;
            position: relative;
            z-index: 5;
        }

        /* --- GLASS PANEL --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px;
            max-width: 750px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* --- MÜHÜR LOGO (BİREBİR AYNI) --- */
        .logo-seal {
            position: relative; display: flex; align-items: center; gap: 15px;
            padding: 25px 45px; border-radius: 60px;
            margin: 0 auto 30px auto; width: fit-content;
        }
        .logo-seal::before {
            content: ""; position: absolute; inset: 0; border-radius: 60px; padding: 2px;
            background: linear-gradient(135deg, var(--gold) 0%, transparent 50%, var(--lila) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
        }

        .f-text { font-size: 6rem; font-weight: 700; color: var(--gold); line-height: 1; }
        .o-ring { width: 80px; height: 80px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; position: relative; }
        
        .taegeuk-swirl {
            width: 65px; height: 65px; border-radius: 50%;
            background: linear-gradient(180deg, var(--korea-red) 50%, var(--korea-blue) 50%);
            transform: rotate(-30deg); position: relative;
        }
        .taegeuk-swirl::before { content: ''; position: absolute; width: 32.5px; height: 32.5px; background: var(--korea-red); border-radius: 50%; top: 16.25px; left: 0; }
        .taegeuk-swirl::after { content: ''; position: absolute; width: 32.5px; height: 32.5px; background: var(--korea-blue); border-radius: 50%; top: 16.25px; right: 0; }
        
        .compass-needle { width: 3px; height: 55px; background: linear-gradient(var(--gold) 50%, #fff 50%); position: absolute; animation: drift 5s infinite; }

        .brand-sub { letter-spacing: 12px; text-transform: uppercase; font-weight: 700; background: linear-gradient(to right, var(--gold), var(--lila)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        @keyframes drift { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(20deg); } }

        /* DOTS */
        .dots { position: fixed; right: 30px; top: 50%; transform: translateY(-50%); z-index: 1000; }
        .dot { width: 10px; height: 10px; background: rgba(255,255,255,0.2); margin: 25px 0; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .dot.active { background: var(--lila); transform: scale(1.8); box-shadow: 0 0 15px var(--lila); }

    </style>
</head>
<body>

    <header>
        <a href="javascript:go(0)" class="header-logo">FOO PORTAL</a>
        <div class="nav-links">
            <a href="javascript:go(0)">GİRİŞ</a>
            <a href="javascript:go(1)">KORE ARŞİVİ</a>
            <a href="javascript:go(2)">SINAV MERKEZİ</a>
        </div>
    </header>

    <div id="bg-0" class="bg-layer"></div>
    <div id="bg-1" class="bg-layer"></div>
    <div id="bg-2" class="bg-layer"></div>

    <div class="dots">
        <div class="dot active" onclick="go(0)"></div>
        <div class="dot" onclick="go(1)"></div>
        <div class="dot" onclick="go(2)"></div>
    </div>

    <section id="sec-0">
        <div class="glass-panel">
            <div class="logo-seal">
                <div class="f-text">F</div>
                <div class="o-ring"><div class="taegeuk-swirl"></div></div>
                <div class="o-ring"><div class="compass-needle"></div></div>
            </div>
            <div class="brand-sub">Ongun Orak</div>
            <p style="margin-top: 30px; font-weight: 300; opacity: 0.8; letter-spacing: 2px;">DIGITAL CULTURE PORTAL</p>
        </div>
    </section>

    <section id="sec-1">
        <div class="glass-panel">
            <h2 style="color: var(--lila); font-size: 2.5rem;">Kore Arşivi</h2>
            <p>Seul'dan gelen esintilerle dil ve kültür yolculuğu.</p>
        </div>
    </section>

    <section id="sec-2">
        <div class="glass-panel">
            <h2 style="color: var(--gold); font-size: 2.5rem;">Sınav Merkezi</h2>
            <p>Turizm profesyonelleri için dijital kütüphane.</p>
        </div>
    </section>

    <script>
        function go(index) {
            window.scrollTo({ top: window.innerHeight * index, behavior: 'smooth' });
        }

        window.addEventListener('scroll', () => {
            const scrollPos = window.scrollY;
            const windowHeight = window.innerHeight;
            const currentIndex = Math.round(scrollPos / windowHeight);
            
            document.querySelectorAll('.bg-layer').forEach((layer, i) => {
                layer.style.opacity = (i === currentIndex) ? '1' : '0';
            });

            document.querySelectorAll('.dot').forEach((dot, i) => {
                if(i === currentIndex) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        });
    </script>
</body>
</html>
