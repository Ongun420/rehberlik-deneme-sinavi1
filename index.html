<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOO | Digital Guide & Culture</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --lila: #E9D5FF;
            --gold: #EAB308;
            --korea-red: #CD313A;
            --korea-blue: #0047A0;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Ubuntu', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
        }

        /* ARKA PLAN - EN ALT KATMAN */
        .bg-layer {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100vh;
            z-index: -1; opacity: 0;
            transition: opacity 1s ease;
            background-size: cover; background-position: center;
        }
        #bg-home { opacity: 1; background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); }
        #bg-kore { background: linear-gradient(rgba(2,6,23,0.8), rgba(2,6,23,0.8)), url('https://images.unsplash.com/photo-1538669715515-5c39893d7904?q=80&w=1920'); }
        #bg-exam { background: linear-gradient(rgba(2,6,23,0.8), rgba(2,6,23,0.8)), url('https://images.unsplash.com/photo-1599110906885-b024c90c2773?q=80&w=1920'); }

        /* HEADER */
        header {
            position: fixed; top: 0; width: 100%;
            padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        .header-logo { text-decoration: none; color: white; display: flex; align-items: center; gap: 10px; }
        .nav-links a { text-decoration: none; color: white; margin-left: 20px; font-size: 0.8rem; opacity: 0.7; letter-spacing: 1px; }

        /* SECTIONS */
        section {
            position: relative;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; /* Arka plandan yukarıda olmasını sağlar */
        }

        /* GLASS PANELS */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px;
            max-width: 700px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            /* Görünürlük ayarı */
            opacity: 1 !important; 
            transform: none !important;
        }

        /* LOGO TASARIMI */
        .logo-box { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .f-letter { font-size: 5rem; font-weight: 700; color: var(--gold); }
        .circle-o { 
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .taegeuk {
            width: 55px; height: 55px; border-radius: 50%;
            background: linear-gradient(180deg, var(--korea-red) 50%, var(--korea-blue) 50%);
            transform: rotate(-30deg); position: relative;
        }
        .taegeuk::before { content: ''; position: absolute; width: 27.5px; height: 27.5px; background: var(--korea-red); border-radius: 50%; top: 13.75px; left: 0; }
        .taegeuk::after { content: ''; position: absolute; width: 27.5px; height: 27.5px; background: var(--korea-blue); border-radius: 50%; top: 13.75px; right: 0; }
        
        .needle { width: 3px; height: 50px; background: linear-gradient(var(--gold) 50%, #fff 50%); position: absolute; }

        .sub-text { letter-spacing: 10px; text-transform: uppercase; font-weight: 700; color: var(--lila); margin-top: 10px; }
