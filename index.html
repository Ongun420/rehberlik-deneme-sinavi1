<!DOCTYPE html>
<html lang="tr">
<head>

            font-family: sans-serif;
            height: 100%;

        /* İÇERİĞİ ZORLA EN ÖNE GETİRİYORUZ */

            border-radius: 20px;

        h1 { color: #EAB308; font-size: 3rem; margin: 0; }

</head>
<body>

    <div class="main-container">
        <div class="test-panel">
            <h1>FOO PORTAL GELDİ!</h1>
            <p>Eğer bu yazıyı ve altın çerçeveyi görüyorsan iskelet kurtarıldı.</p>
            <div style="font-size: 5rem; margin-top: 20px;">🇰🇷 🧭</div>
