<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOO | Digital Guide & Culture</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --lila: #E9D5FF;
            --gold: #EAB308;
            --korea-red: #CD313A;
            --korea-blue: #0047A0;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Ubuntu', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .bg-layer {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100vh;
            z-index: -1;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        #bg-home { opacity: 1; background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); }
        #bg-kore { background: linear-gradient(rgba(2,6,23,0.85), rgba(2,6,23,0.85)), url('https://images.unsplash.com/photo-1538669715515-5c39893d7904?q=80&w=1920'); }
        #bg-exam { background: linear-gradient(rgba(2,6,23,0.85), rgba(2,6,23,0.85)), url('https://images.unsplash.com/photo-1599110906885-b024c90c2773?q=80&w=1920'); }

        section { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 0 10%; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 60px;
            max-width: 750px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        /* --- ÇAPRAZ RENKLİ MÜHÜRLÜ LOGO --- */
        .logo-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo-seal-frame {
            position: relative;
            padding: 25px 45px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 60px;
            transition: all 0.5s ease;
            background: rgba(255, 255, 255, 0.01);
            z-index: 1;
        }

        /* Çapraz Renkli Çerçeve Katmanı */
        .logo-seal-frame::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 60px;
            padding: 2px; /* Çerçeve kalınlığı */
            background: linear-gradient(135deg, var(--gold) 0%, transparent 50%, var(--lila) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.2);
        }

        .logo-seal-frame:hover::before {
            background: linear-gradient(135deg, var(--gold) 0%, #fff 50%, var(--lila) 100%);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        .letter-f {
            font-size: 6.5rem;
            font-weight: 700;
            line-height: 1;
            color: var(--gold); /* Rehberlik tarafı */
            text-shadow: 0 0 15px rgba(234, 179, 8, 0.3);
        }

        .symbol-o {
            width: 85px; height: 85px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Kore Taegeuk */
        .inner-korea {
            width: 70px; height: 70px;
            border-radius: 50%;
            background: linear-gradient(180deg, var(--korea-red) 50%, var(--korea-blue) 50%);
            transform: rotate(-30deg);
            position: relative;
            box-shadow: 0 0 15px rgba(233, 213, 255, 0.2);
        }
        .inner-korea::before { content: ''; position: absolute; width: 35px; height: 35px; background: var(--korea-red); border-radius: 50%; top: 17.5px; left: 0; }
        .inner-korea::after { content: ''; position: absolute; width: 35px; height: 35px; background: var(--korea-blue); border-radius: 50%; top: 17.5px; right: 0; }

        /* Pusula İğnesi */
        .compass-needle {
            width: 3px; height: 60px;
            background: linear-gradient(to bottom, var(--gold) 50%, white 50%);
            position: absolute;
            animation: drift 5s ease-in-out infinite;
        }

        .sub-logo-text {
            font-size: 0.75rem;
            letter-spacing: 14px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-top: 20px;
            background: linear-gradient(to right, var(--gold), var(--lila));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        h2 { font-size: 2.8rem; margin-top: 0; font-weight: 700; }
